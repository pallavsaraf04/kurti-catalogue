<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kurti Catalogue · Jariwala Trading Company</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #c9184a;
    --rose-light: #ff4d6d;
    --rose-pale: #fff0f3;
    --rose-mid: #ffb3c1;
    --ink: #1a0a0e;
    --ink-soft: #4a2030;
    --cream: #fdf6f0;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --card-bg: #ffffff;
    --border: #f0d6dc;
    --shadow: 0 4px 32px rgba(201,24,74,0.08);
    --shadow-hover: 0 8px 40px rgba(201,24,74,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; color: var(--ink); }

  /* ── TOP ACCENT ── */
  .top-band { height: 4px; background: linear-gradient(90deg, var(--rose) 0%, var(--gold) 50%, var(--rose) 100%); }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(201,24,74,0.35) 0%, transparent 65%);
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,24,74,0.4), transparent);
  }
  .header-logo {
    width: 96px; height: 96px;
    object-fit: contain;
    border-radius: 50%;
    background: white;
    padding: 6px;
    margin-bottom: 12px;
    position: relative;
    box-shadow: 0 0 0 2px rgba(201,24,74,0.3), 0 4px 20px rgba(0,0,0,0.4);
  }
  .brand-label {
    font-size: 9px; font-weight: 600; letter-spacing: 5px;
    text-transform: uppercase; color: var(--rose-mid);
    margin-bottom: 6px; position: relative;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 6vw, 34px);
    color: #fff; font-weight: 700; position: relative;
    line-height: 1.2;
  }
  header h1 span { color: var(--gold); }
  .subtitle {
    font-size: 11px; color: rgba(255,255,255,0.38);
    margin-top: 6px; letter-spacing: 1.5px; position: relative;
  }

  /* ── LAYOUT ── */
  .main { max-width: 680px; margin: 0 auto; padding: 20px 14px 70px; }

  /* ── SEARCH ── */
  .search-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 18px 16px 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .search-label {
    font-size: 10px; font-weight: 600; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--rose);
    margin-bottom: 10px; display: block;
  }
  .search-row { display: flex; gap: 10px; }
  .search-input {
    flex: 1;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 500;
    color: var(--ink); background: var(--rose-pale);
    outline: none; transition: border-color 0.2s, background 0.2s;
  }
  .search-input:focus { border-color: var(--rose); background: #fff; }
  .search-input::placeholder { color: #c4a0ab; font-weight: 300; }
  .search-btn {
    padding: 14px 22px;
    background: var(--rose); color: white;
    border: none; border-radius: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    white-space: nowrap; letter-spacing: 0.5px;
  }
  .search-btn:active { transform: scale(0.96); background: var(--rose-light); }
  .search-btn:hover { background: var(--rose-light); }

  /* ── SUGGESTIONS ── */
  .suggestions-wrap { position: relative; z-index: 20; margin-bottom: 12px; }
  .suggestions-inner {
    background: white; border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(201,24,74,0.12);
    overflow: hidden; max-height: 220px; overflow-y: auto;
  }
  .suggestion-item {
    padding: 11px 16px; cursor: pointer; font-size: 13px;
    color: var(--ink); display: flex; align-items: center;
    gap: 10px; border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--rose-pale); }
  .sug-no { font-weight: 600; color: var(--rose); font-size: 14px; }
  .sug-desc { font-size: 11px; color: var(--ink-soft); opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }

  /* ── STATUS ── */
  .data-status {
    text-align: center; font-size: 11px; color: #b090a0;
    margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #c4a0ab; flex-shrink: 0; }
  .dot.green  { background: #4caf50; }
  .dot.loading { background: var(--gold); animation: pulse 1s infinite; }
  .dot.error  { background: #e53935; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .status-msg { text-align: center; padding: 20px; font-size: 14px; color: var(--ink-soft); line-height: 1.7; }
  .status-msg.error { color: #b00020; background: #fff0f3; border-radius: 16px; border: 1px solid #ffd6de; }

  /* ── RESULT COUNT ── */
  .multi-header {
    font-size: 13px; color: var(--ink-soft);
    margin-bottom: 14px; text-align: center;
    padding: 10px 16px; background: var(--rose-pale);
    border-radius: 12px; border: 1px solid var(--border);
  }
  .multi-header strong { color: var(--rose); }

  /* ── RESULT CARD ── */
  .result-card {
    background: var(--card-bg);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    animation: slideUp 0.35s cubic-bezier(0.2,0.8,0.3,1) both;
    margin-bottom: 18px;
    transition: box-shadow 0.2s;
  }
  .result-card:hover { box-shadow: var(--shadow-hover); }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(18px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── CARD HEADER ── */
  .result-header {
    background: var(--ink); padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .result-header::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 0% 50%, rgba(201,24,74,0.25) 0%, transparent 60%);
  }
  .design-badge { position: relative; }
  .design-badge .tag {
    font-size: 9px; font-weight: 600; letter-spacing: 3px;
    text-transform: uppercase; color: var(--rose-mid);
    display: block; margin-bottom: 2px;
  }
  .design-badge .number {
    font-family: 'Playfair Display', serif;
    font-size: 26px; color: #fff; font-weight: 700; line-height: 1;
  }

  /* ── PHOTO ── */
  .photo-wrap {
    width: 100%; background: #f8f0f2;
    overflow: hidden; max-height: 460px;
    display: flex; align-items: center; justify-content: center;
    position: relative; min-height: 200px;
  }
  .photo-wrap img {
    width: 100%; height: 100%;
    object-fit: contain; max-height: 460px;
    display: block;
    opacity: 0; transition: opacity 0.4s ease;
  }
  .photo-wrap img.loaded { opacity: 1; }
  .photo-spinner-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #f8f0f2; transition: opacity 0.3s;
  }
  .photo-spinner {
    width: 30px; height: 30px;
    border: 3px solid var(--border);
    border-top-color: var(--rose);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .no-photo {
    padding: 50px 20px; color: #c4a0ab;
    font-size: 13px; text-align: center; line-height: 2;
  }
  .no-photo .icon { font-size: 36px; display: block; margin-bottom: 8px; opacity: 0.4; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── INFO GRID ── */
  .info-grid {
    padding: 16px 14px 4px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .field {
    background: var(--rose-pale);
    border-radius: 14px; padding: 13px 14px;
    border: 1px solid var(--border);
  }
  .field.wide { grid-column: 1 / -1; }
  .field-label {
    font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--rose);
    margin-bottom: 5px; display: block;
  }
  .field-value {
    font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.45;
  }
  .field-value.price {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 700; color: var(--rose);
    line-height: 1;
  }
  .field-value.price-ws {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 700; color: var(--ink-soft);
    line-height: 1;
  }
  .field-value.empty {
    color: #c4a0ab; font-style: italic; font-weight: 300; font-size: 12px;
  }
  .field-value.desc { font-size: 13px; color: var(--ink-soft); font-weight: 400; line-height: 1.55; }

  /* ── INTERNAL DETAILS ── */
  .internal-btn-wrap { padding: 10px 14px; }
  .internal-btn {
    width: 100%; padding: 13px;
    background: transparent;
    border: 2px dashed var(--rose-mid);
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--rose); cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s; letter-spacing: 0.5px;
  }
  .internal-btn:hover { background: var(--rose-pale); border-color: var(--rose); }
  .internal-btn:active { transform: scale(0.98); }
  .internal-btn .lock-icon { font-size: 15px; transition: transform 0.3s; }
  .internal-btn.open { background: var(--rose); color: white; border-style: solid; border-color: var(--rose); }
  .internal-btn.open .lock-icon { transform: rotate(20deg); }

  .internal-details {
    display: none; padding: 0 14px 4px;
    animation: fadeIn 0.3s ease;
  }
  .internal-details.visible { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  .field.internal {
    background: #fff8f0;
    border-color: var(--gold-light);
  }
  .field.internal .field-label { color: var(--gold); }
  .field.internal .field-value { color: var(--ink-soft); }
  .field.internal .field-value.price-internal {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700; color: #8a6a10;
  }

  /* ── CARD FOOTER SPACING ── */
  .card-bottom { height: 14px; }

  /* ── WATERMARK ── */
  .watermark {
    text-align: center; margin-top: 30px;
    font-size: 10px; color: #d0b0b8; letter-spacing: 2px;
    text-transform: uppercase;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .watermark-logo {
    width: 32px; height: 32px;
    object-fit: contain; opacity: 0.35;
    filter: grayscale(100%);
  }

  /* ── TAB BAR ── */
  .tab-bar{display:flex;background:var(--card-bg);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:16px;}
  .tab-btn{flex:1;padding:13px 8px;background:transparent;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#b090a0;cursor:pointer;letter-spacing:0.3px;transition:background 0.2s,color 0.2s;border-right:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:5px;}
  .tab-btn:last-child{border-right:none;}
  .tab-btn.active{background:var(--rose);color:white;}
  .tab-btn:not(.active):hover{background:var(--rose-pale);color:var(--rose);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  /* ── BROWSE GRID ── */
  .browse-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
  .grid-card{background:var(--card-bg);border-radius:18px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:box-shadow 0.2s,transform 0.15s;animation:slideUp 0.3s cubic-bezier(0.2,0.8,0.3,1) both;}
  .grid-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px);}
  .grid-card:active{transform:scale(0.97);}
  .grid-img-wrap{width:100%;aspect-ratio:3/4;background:#f8f0f2;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;}
  .grid-img-wrap img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.3s;}
  .grid-img-wrap img.loaded{opacity:1;}
  .grid-no-photo{font-size:28px;opacity:0.25;}
  .grid-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f8f0f2;}
  .grid-spinner-ring{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--rose);border-radius:50%;animation:spin 0.7s linear infinite;}
  .grid-info{padding:10px 12px 12px;}
  .grid-dn{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--ink);line-height:1;margin-bottom:4px;}
  .grid-price{font-size:11px;color:var(--rose);font-weight:600;}
  .grid-stock{font-size:10px;color:#b090a0;margin-top:2px;}
  .grid-stock.low{color:#e53935;}
  .load-more-btn{width:100%;padding:14px;background:transparent;border:2px dashed var(--rose-mid);border-radius:14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--rose);cursor:pointer;transition:all 0.2s;margin-bottom:20px;}
  .load-more-btn:hover{background:var(--rose-pale);border-color:var(--rose);}
  /* ── SERIES FILTER ── */
  .series-filter-wrap{margin-bottom:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
  .series-filter-wrap::-webkit-scrollbar{display:none;}
  .series-pills{display:flex;gap:8px;width:max-content;}
  .series-pill{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-bg);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;color:#b090a0;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .series-pill:hover{border-color:var(--rose);color:var(--rose);background:var(--rose-pale);}
  .series-pill.active{background:var(--rose);color:white;border-color:var(--rose);}
  /* ── SHARE BUTTON ── */
  .share-btn-wrap{padding:0 14px 14px;}
  .share-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;background:#25D366;border:none;color:white;}
  .share-btn:hover{background:#1ebe5d;}
  .share-btn:active{transform:scale(0.97);}
  /* ── STOCK FIELD ── */
  .field-value.price-stock{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;line-height:1;}

  /* ── SORT BAR ── */
  .sort-wrap{margin-bottom:12px;display:flex;align-items:center;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .sort-wrap::-webkit-scrollbar{display:none;}
  .sort-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#b090a0;white-space:nowrap;flex-shrink:0;}
  .sort-btn{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-bg);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:#b090a0;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
  .sort-btn:hover{border-color:var(--rose);color:var(--rose);background:var(--rose-pale);}
  .sort-btn.active{background:var(--ink);color:white;border-color:var(--ink);}

  /* ── PRICE FILTER ── */
  .price-filter-wrap{margin-bottom:14px;}
  .price-filter-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#b090a0;margin-bottom:8px;display:block;}
  .price-pills{display:flex;gap:8px;flex-wrap:wrap;}
  .price-pill{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card-bg);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;color:#b090a0;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
  .price-pill:hover{border-color:var(--gold);color:var(--gold);background:#fffbf0;}
  .price-pill.active{background:var(--gold);color:white;border-color:var(--gold);}

  /* ── COPY BUTTON ── */
  .copy-btn-wrap{padding:0 14px 10px;}
  .copy-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;background:transparent;border:1.5px solid var(--border);color:var(--ink-soft);}
  .copy-btn:hover{background:var(--rose-pale);border-color:var(--rose);color:var(--rose);}
  .copy-btn:active{transform:scale(0.97);}
  .copy-btn.copied{background:var(--rose-pale);border-color:var(--rose);color:var(--rose);}
</style>
</head>
<body>
<div class="top-band"></div>

<header>
  <img src="JTC.jpg" alt="JTC Logo" class="header-logo">
  <div class="brand-label">Jariwala Trading Company</div>
  <h1>Kurti <span>Catalogue</span></h1>
  <div class="subtitle">Search · Browse · Share</div>
</header>

<div class="main">
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-search" onclick="switchTab('search')">&#128269; Search</button>
    <button class="tab-btn" id="tab-browse" onclick="switchTab('browse')">&#128193; Browse All</button>
  </div>
  <div class="tab-panel active" id="panel-search">
    <div class="search-card">
      <span class="search-label">Search by Design Number</span>
      <div class="search-row">
        <input class="search-input" id="searchInput" type="text" placeholder="e.g. 1317, 2025…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
        <button class="search-btn" onclick="doSearch()">Search</button>
      </div>
    </div>
    <div id="suggestionsWrap" class="suggestions-wrap" style="display:none">
      <div class="suggestions-inner" id="suggestionsList"></div>
    </div>
    <div class="data-status">
      <div class="dot loading" id="statusDot"></div>
      <span id="statusText">Loading catalogue…</span>
    </div>
    <div id="output"></div>
  </div>
  <div class="tab-panel" id="panel-browse">
    <div class="data-status" id="browseStatus" style="display:none">
      <div class="dot loading"></div><span>Loading…</span>
    </div>
    <div class="series-filter-wrap"><div class="series-pills" id="seriesPills"></div></div>
    <div class="price-filter-wrap">
      <span class="price-filter-label">Price Range</span>
      <div class="price-pills">
        <button class="price-pill active" data-price="all"       onclick="setPriceFilter('all')">All</button>
        <button class="price-pill"        data-price="u1000"     onclick="setPriceFilter('u1000')">Under &#x20B9;1000</button>
        <button class="price-pill"        data-price="1000-1500" onclick="setPriceFilter('1000-1500')">&#x20B9;1000&#x2013;1500</button>
        <button class="price-pill"        data-price="1500-2000" onclick="setPriceFilter('1500-2000')">&#x20B9;1500&#x2013;2000</button>
        <button class="price-pill"        data-price="2000-2500" onclick="setPriceFilter('2000-2500')">&#x20B9;2000&#x2013;2500</button>
        <button class="price-pill"        data-price="2500-3000" onclick="setPriceFilter('2500-3000')">&#x20B9;2500&#x2013;3000</button>
        <button class="price-pill"        data-price="o3000"     onclick="setPriceFilter('o3000')">&#x20B9;3000+</button>
      </div>
    </div>
    <div class="sort-wrap">
      <span class="sort-label">Sort</span>
      <button class="sort-btn active" data-sort="default"    onclick="setSortOrder('default')">Default</button>
      <button class="sort-btn"        data-sort="stock-asc"  onclick="setSortOrder('stock-asc')">&#x26A0; Low Stock First</button>
      <button class="sort-btn"        data-sort="price-asc"  onclick="setSortOrder('price-asc')">Price &#x2191;</button>
      <button class="sort-btn"        data-sort="price-desc" onclick="setSortOrder('price-desc')">Price &#x2193;</button>
    </div>
    <div class="browse-grid" id="browseGrid"></div>
    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMoreGrid()" style="display:none">Load More Designs</button>
  </div>
  <div class="watermark">
    <img src="JTC.jpg" alt="JTC" class="watermark-logo">
    <div>Jariwala Trading Company · Kurti Catalogue</div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────
var CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWE67lriCuoTDuBUkcIKEQ1SlNXYerEsGb5qhhW7GfTGN70nH3UqpPlGBCS5BHy9RAtxVy-Oe60v_7/pub?output=csv';
var IMG_PROXY = 'https://jtc-image-proxy.pallavsaraf04.workers.dev/';

// Column indices (0-based) — A=0, B=1, C=2, D=3, E=4, F=5, G=6
var COL_DESIGN      = 0;  // A — Design Number
var COL_DESC        = 1;  // B — Description
var COL_HAND_RATE   = 2;  // C — Hand Rate (restricted)
var COL_COSTING     = 3;  // D — Costing (restricted)
var COL_RETAIL      = 4;  // E — Retail Rate
var COL_WHOLESALE   = 5;  // F — Wholesale Rate
var COL_PHOTO       = 6;  // G — Photo Link
var COL_STOCK       = 7;  // H — Stock in Hand

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
var allRows = [];  // array of cleaned row arrays

// ─────────────────────────────────────────────────────────────────
// FETCH — tries direct first, then CORS proxies
// ─────────────────────────────────────────────────────────────────
function fetchCSV(url) {
  var attempts = [
    url,
    'https://corsproxy.io/?url=' + encodeURIComponent(url),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
    'https://cors-anywhere.herokuapp.com/' + url
  ];
  function tryNext(i) {
    if (i >= attempts.length) return Promise.resolve(null);
    return fetch(attempts[i], { cache: 'no-cache' })
      .then(function(resp) {
        if (!resp.ok) return tryNext(i + 1);
        return resp.text().then(function(text) {
          if (text && text.length > 30 && text.indexOf('<!DOCTYPE') === -1 && text.indexOf('<html') === -1) {
            return text;
          }
          return tryNext(i + 1);
        });
      })
      .catch(function() { return tryNext(i + 1); });
  }
  return tryNext(0);
}

// ─────────────────────────────────────────────────────────────────
// CSV PARSER — handles quoted fields with commas/newlines
// ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  var rows = [];
  var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  for (var l = 0; l < lines.length; l++) {
    var line = lines[l];
    var row = [], inQ = false, cell = '';
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cell += '"'; i++; }
        else { inQ = !inQ; }
      } else if (c === ',' && !inQ) {
        row.push(cell.trim()); cell = '';
      } else {
        cell += c;
      }
    }
    row.push(cell.trim());
    rows.push(row);
  }
  return rows;
}

// ─────────────────────────────────────────────────────────────────
// LOAD
// ─────────────────────────────────────────────────────────────────
function loadData() {
  updateStatus('loading', 'Loading catalogue…');
  fetchCSV(CSV_URL).then(function(text) {
    if (!text) {
      updateStatus('error', 'Could not load data');
      document.getElementById('output').innerHTML =
        '<div class="status-msg error">⚠️ Could not load the catalogue.<br><small>Check that the Google Sheet is published to the web.</small></div>';
      return;
    }
    var parsed = parseCSV(text);
    allRows = parsed.slice(1).filter(function(r) {
      return r[COL_DESIGN] && r[COL_DESIGN].trim() !== '';
    });
    if (!allRows.length) {
      updateStatus('error', 'No data found');
      document.getElementById('output').innerHTML =
        '<div class="status-msg error">No design rows found in the sheet.</div>';
      return;
    }
    updateStatus('green', allRows.length + ' designs loaded');
  });
}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────
function roundToNearest5(val) {
  var n = parseFloat(val);
  if (isNaN(n)) return val;
  return Math.round(n / 5) * 5;
}

// Returns Drive file ID from any Drive URL format, or null
function extractDriveId(raw) {
  if (!raw) return null;
  raw = raw.trim();
  if (!raw || raw === '-') return null;
  var m;
  m = raw.match(/\/file\/d\/([a-zA-Z0-9_-]{10,})/); if (m) return m[1];
  m = raw.match(/[?&]id=([a-zA-Z0-9_-]{10,})/);        if (m) return m[1];
  m = raw.match(/\/d\/([a-zA-Z0-9_-]{10,})/);         if (m) return m[1];
  return null;
}

// Returns proxied URL for display (CORS-safe for canvas)
function makePhotoUrl(raw) {
  if (!raw) return null;
  raw = raw.trim();
  if (!raw || raw === '-') return null;
  var id = extractDriveId(raw);
  if (id) return IMG_PROXY + '?id=' + id;
  if (/^https?:\/\//.test(raw)) return raw;
  return null;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function makeWaUrl(designNum, retailRaw, desc, photoUrl) {
  var lines = ['*Jariwala Trading Company*', 'Design No: *' + designNum + '*'];
  if (desc) lines.push(desc);
  if (retailRaw) lines.push('₹' + retailRaw);
  if (photoUrl) lines.push(photoUrl);
  return 'https://wa.me/?text=' + encodeURIComponent(lines.join('\n'));
}

// ─────────────────────────────────────────────────────────────────
// RENDER CARD
// ─────────────────────────────────────────────────────────────────
var _cardCounter = 0;

function renderCard(row) {
  var id = 'c' + (++_cardCounter);
  var designNum  = esc((row[COL_DESIGN]   || '').trim());
  var desc       = esc((row[COL_DESC]     || '').trim());
  var retailRaw  = (row[COL_RETAIL]    || '').trim();
  var wsRaw      = (row[COL_WHOLESALE] || '').trim();
  var handRaw    = (row[COL_HAND_RATE] || '').trim();
  var costRaw    = (row[COL_COSTING]   || '').trim();
  var photoUrl   = makePhotoUrl(row[COL_PHOTO] || '');

  var wsRounded  = wsRaw ? roundToNearest5(wsRaw) : null;

  // Photo HTML
  var photoHTML;
  if (photoUrl) {
    photoHTML =
      '<div class="photo-wrap" id="pw-' + id + '">' +
        '<div class="photo-spinner-wrap" id="ps-' + id + '"><div class="photo-spinner"></div></div>' +
        '<img id="pi-' + id + '" alt="Design ' + designNum + '" data-src="' + esc(photoUrl) + '">' +
      '</div>';
  } else {
    photoHTML =
      '<div class="photo-wrap">' +
        '<div class="no-photo"><span class="icon">🖼</span>No photo linked</div>' +
      '</div>';
  }

  // Rate fields
  var retailHTML = retailRaw
    ? '<span class="field-value price">₹' + esc(retailRaw) + '</span>'
    : '<span class="field-value empty">Not set</span>';

  var wsHTML = wsRounded !== null
    ? '<span class="field-value price-ws">₹' + wsRounded + '</span>'
    : '<span class="field-value empty">Not set</span>';

  var stockRaw = (row[COL_STOCK] || '').toString().trim();
  var stockHTML;
  if (stockRaw !== '' && stockRaw !== '-') {
    var stockNum = parseFloat(stockRaw);
    var stockColor = (!isNaN(stockNum) && stockNum <= 0) ? '#e53935' : '#1a0a0e';
    stockHTML = '<span class="field-value price-stock" style="color:' + stockColor + '">' + esc(stockRaw) + ' PCS</span>';
  } else {
    stockHTML = '<span class="field-value empty">Not set</span>';
  }

  var descHTML = desc
    ? '<span class="field-value desc">' + desc + '</span>'
    : '<span class="field-value empty">No description</span>';

  // Internal details
  var handHTML = handRaw
    ? '<span class="field-value price-internal">₹' + esc(handRaw) + '</span>'
    : '<span class="field-value empty">—</span>';

  var costHTML = costRaw
    ? '<span class="field-value price-internal">₹' + esc(costRaw) + '</span>'
    : '<span class="field-value empty">—</span>';

  return (
    '<div class="result-card">' +

      // Header
      '<div class="result-header">' +
        '<div class="design-badge">' +
          '<span class="tag">Design No.</span>' +
          '<span class="number">' + designNum + '</span>' +
        '</div>' +
      '</div>' +

      // Photo
      photoHTML +

      // Main info
      '<div class="info-grid">' +
        '<div class="field">' +
          '<span class="field-label">Retail Rate</span>' +
          retailHTML +
        '</div>' +
        '<div class="field">' +
          '<span class="field-label">Wholesale Rate</span>' +
          wsHTML +
        '</div>' +
        '<div class="field wide">' +
          '<span class="field-label">Stock in Hand</span>' +
          stockHTML +
        '</div>' +
        '<div class="field wide">' +
          '<span class="field-label">Description</span>' +
          descHTML +
        '</div>' +
      '</div>' +

      // Internal details button
      '<div class="internal-btn-wrap">' +
        '<button class="internal-btn" id="ib-' + id + '" onclick="toggleInternal(\'' + id + '\')">' +
          '<span class="lock-icon">🔒</span> View Internal Details' +
        '</button>' +
      '</div>' +

      // Hidden internal details
      '<div class="internal-details" id="id-' + id + '">' +
        '<div class="field internal">' +
          '<span class="field-label">Hand Rate</span>' +
          handHTML +
        '</div>' +
        '<div class="field internal">' +
          '<span class="field-label">Costing</span>' +
          costHTML +
        '</div>' +
      '</div>' +

      '<div class="copy-btn-wrap">' +
        '<button class="copy-btn" id="cb-' + id + '" onclick="copyDetails(\'' + id + '\',\'' + designNum + '\',' + (retailRaw ? '\'' + esc(retailRaw) + '\'' : 'null') + ',\'' + esc(desc||'') + '\')">' +
          '&#x1F4CB; Copy Details' +
        '</button>' +
      '</div>' +
      '<div class="share-btn-wrap" style="display:flex;gap:8px;padding:0 14px 14px;">' +
        '<button class="share-btn" style="flex:1;background:#c9184a;" onclick="shareDesign(\'' + designNum + '\',' + (retailRaw ? '\'' + esc(retailRaw) + '\'' : 'null') + ',\'' + esc(desc||'') + '\',' + '\'' + esc(photoUrl||'') + '\',' + '\'retail\')">' +
          '&#x1F3EA; Retail' +
        '</button>' +
        '<button class="share-btn" style="flex:1;background:#4a2030;" onclick="shareDesign(\'' + designNum + '\',' + (wsRounded !== null ? '\'' + wsRounded + '\'' : 'null') + ',\'' + esc(desc||'') + '\',' + '\'' + esc(photoUrl||'') + '\',' + '\'wholesale\')">' +
          '&#x1F3ED; Wholesale' +
        '</button>' +
      '</div>' +

    '</div>'
  );
}

// ─────────────────────────────────────────────────────────────────
// TOGGLE INTERNAL DETAILS
// ─────────────────────────────────────────────────────────────────
function toggleInternal(id) {
  var detailEl = document.getElementById('id-' + id);
  var btnEl    = document.getElementById('ib-' + id);
  if (!detailEl || !btnEl) return;

  var isOpen = detailEl.classList.contains('visible');
  if (isOpen) {
    detailEl.classList.remove('visible');
    btnEl.classList.remove('open');
    btnEl.innerHTML = '<span class="lock-icon">🔒</span> View Internal Details';
  } else {
    detailEl.classList.add('visible');
    btnEl.classList.add('open');
    btnEl.innerHTML = '<span class="lock-icon">🔓</span> Hide Internal Details';
  }
}

// ─────────────────────────────────────────────────────────────────
// IMAGE LOADER — runs after HTML is inserted into the DOM
// This is the KEY fix: no inline onload/onerror (they cause
// duplicate-fire bugs). Instead we wire up handlers in JS.
// ─────────────────────────────────────────────────────────────────
function initImages() {
  var imgs = document.querySelectorAll('img[data-src]');
  imgs.forEach(function(img) {
    var id = img.id.replace('pi-', '');
    var spinner = document.getElementById('ps-' + id);
    var src = img.getAttribute('data-src');
    if (!src) return;

    var loaded = false;  // guard — prevents both onload+onerror firing

    img.onload = function() {
      if (loaded) return;
      loaded = true;
      img.classList.add('loaded');
      if (spinner) spinner.style.display = 'none';
    };

    img.onerror = function() {
      if (loaded) return;
      loaded = true;
      var wrap = document.getElementById('pw-' + id);
      if (wrap) {
        wrap.innerHTML = '<div class="no-photo"><span class="icon">🖼</span>Photo unavailable</div>';
      }
    };

    // Set src AFTER attaching handlers
    img.src = src;
  });
}

// ─────────────────────────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────────────────────────
function doSearch() {
  hideSuggestions();
  var query  = document.getElementById('searchInput').value.trim().toLowerCase();
  var output = document.getElementById('output');

  if (!query) {
    output.innerHTML = '<div class="status-msg">Please enter a design number to search.</div>';
    return;
  }
  if (!allRows.length) {
    output.innerHTML = '<div class="status-msg error">Data not loaded yet — please wait a moment.</div>';
    return;
  }

  var exact   = allRows.filter(function(r){ return (r[COL_DESIGN]||'').trim().toLowerCase() === query; });
  var partial = allRows.filter(function(r){
    var v = (r[COL_DESIGN]||'').trim().toLowerCase();
    return v.indexOf(query) !== -1 && v !== query;
  });
  var results = exact.concat(partial);

  if (!results.length) {
    output.innerHTML =
      '<div class="status-msg error">No design found for <strong>"' + esc(query) + '"</strong>.<br>' +
      '<small style="opacity:0.7">Double-check the design number and try again.</small></div>';
    return;
  }

  var html = '';
  if (results.length > 1) {
    html += '<div class="multi-header">Found <strong>' + results.length + '</strong> matching design' + (results.length > 1 ? 's' : '') + '</div>';
  }
  html += results.map(renderCard).join('');
  output.innerHTML = html;

  // Wire up image loading AFTER DOM update
  initImages();
}

// ─────────────────────────────────────────────────────────────────
// AUTOCOMPLETE SUGGESTIONS
// ─────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  var q = this.value.trim().toLowerCase();
  if (!q || !allRows.length) { hideSuggestions(); return; }

  var matches = allRows.filter(function(r) {
    return (r[COL_DESIGN]||'').trim().toLowerCase().indexOf(q) !== -1;
  }).slice(0, 8);

  if (!matches.length) { hideSuggestions(); return; }

  document.getElementById('suggestionsList').innerHTML = matches.map(function(r) {
    var dn   = esc((r[COL_DESIGN]||'').trim());
    var desc = esc((r[COL_DESC]  ||'').trim().substring(0, 40));
    return (
      '<div class="suggestion-item" onclick="selectSuggestion(\'' + dn.replace(/'/g,"\\'") + '\')">' +
        '<span class="sug-no">' + dn + '</span>' +
        (desc ? '<span class="sug-desc">' + desc + (r[COL_DESC].length > 40 ? '…' : '') + '</span>' : '') +
      '</div>'
    );
  }).join('');

  document.getElementById('suggestionsWrap').style.display = 'block';
});

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter')  { doSearch(); }
  if (e.key === 'Escape') { hideSuggestions(); }
});

function selectSuggestion(val) {
  document.getElementById('searchInput').value = val;
  hideSuggestions();
  doSearch();
}

function hideSuggestions() {
  document.getElementById('suggestionsWrap').style.display = 'none';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('#suggestionsWrap') && !e.target.closest('#searchInput')) {
    hideSuggestions();
  }
});

// ─────────────────────────────────────────────────────────────────
// STATUS
// ─────────────────────────────────────────────────────────────────
function updateStatus(state, text) {
  var dot = document.getElementById('statusDot');
  dot.className = 'dot ' + (state === 'green' ? 'green' : state === 'error' ? 'error' : 'loading');
  document.getElementById('statusText').textContent = text;
}

// ─────────────────────────────────────────────────────────────────
// TAB SWITCHING
// ─────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab==='browse' && document.getElementById('browseGrid').children.length===0) renderBrowseGrid();
}

// ─────────────────────────────────────────────────────────────────
// SERIES FILTER + SORT + PRICE FILTER + BROWSE GRID
// ─────────────────────────────────────────────────────────────────
var GRID_PAGE_SIZE=20, gridOffset=0;
var activeSeriesFilter='all';
var activeSortOrder='default';
var activePriceFilter='all';

// ── Fabric series map ──
var FABRIC_MAP = {
  '11': 'Dola',
  '12': 'Roman',
  '13': 'Tissue',
  '14': 'Jacquard',
  '15': 'Mul Chanderi',
  '16': 'Chinnon',
  '20': 'Indo Western',
  '30': 'Half & Half',
  '40': 'Giraffe'
};

function buildSeriesPills() {
  var seen={}, series=[];
  allRows.forEach(function(row){
    var dn=(row[COL_DESIGN]||'').trim();
    var prefix=dn.substring(0,2);
    if (prefix && /^[0-9]{2}$/.test(prefix) && !seen[prefix]) {
      seen[prefix]=true; series.push(prefix);
    }
  });
  series.sort();
  var pills=document.getElementById('seriesPills');
  if (!pills) return;
  pills.innerHTML='';
  var allPill=document.createElement('button');
  allPill.className='series-pill active';
  allPill.textContent='All Fabrics';
  allPill.setAttribute('data-series','all');
  allPill.onclick=function(){ setSeriesFilter('all'); };
  pills.appendChild(allPill);
  series.forEach(function(s){
    var label = FABRIC_MAP[s] || (s + '__');
    var pill=document.createElement('button');
    pill.className='series-pill';
    pill.textContent=label;
    pill.setAttribute('data-series',s);
    pill.onclick=function(){ setSeriesFilter(s); };
    pills.appendChild(pill);
  });
}

function setSeriesFilter(series) {
  activeSeriesFilter=series;
  document.querySelectorAll('.series-pill').forEach(function(p){
    p.classList.toggle('active', p.getAttribute('data-series')===series);
  });
  resetGrid();
}

// ── Sort ──
function setSortOrder(order) {
  activeSortOrder=order;
  document.querySelectorAll('.sort-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-sort')===order);
  });
  resetGrid();
}

// ── Price filter ──
function setPriceFilter(range) {
  activePriceFilter=range;
  document.querySelectorAll('.price-pill').forEach(function(p){
    p.classList.toggle('active', p.getAttribute('data-price')===range);
  });
  resetGrid();
}

function priceInRange(retailRaw, range) {
  if (range==='all') return true;
  var n=parseFloat((retailRaw||'').replace(/[^0-9.]/g,''));
  if (isNaN(n)) return false;
  if (range==='u1000')     return n < 1000;
  if (range==='1000-1500') return n >= 1000 && n <= 1500;
  if (range==='1500-2000') return n > 1500 && n <= 2000;
  if (range==='2000-2500') return n > 2000 && n <= 2500;
  if (range==='2500-3000') return n > 2500 && n <= 3000;
  if (range==='o3000')     return n > 3000;
  return true;
}

// ── Combined filter + sort ──
function getFilteredRows() {
  var rows=allRows;

  // Series filter
  if (activeSeriesFilter!=='all') {
    rows=rows.filter(function(row){
      return (row[COL_DESIGN]||'').trim().substring(0,2)===activeSeriesFilter;
    });
  }

  // Price filter
  if (activePriceFilter!=='all') {
    rows=rows.filter(function(row){
      return priceInRange(row[COL_RETAIL]||'', activePriceFilter);
    });
  }

  // Sort — work on a copy so allRows order is preserved
  rows=rows.slice();
  if (activeSortOrder==='price-asc') {
    rows.sort(function(a,b){
      return (parseFloat(a[COL_RETAIL])||0) - (parseFloat(b[COL_RETAIL])||0);
    });
  } else if (activeSortOrder==='price-desc') {
    rows.sort(function(a,b){
      return (parseFloat(b[COL_RETAIL])||0) - (parseFloat(a[COL_RETAIL])||0);
    });
  } else if (activeSortOrder==='stock-asc') {
    rows.sort(function(a,b){
      var sa=parseFloat(a[COL_STOCK]);
      var sb=parseFloat(b[COL_STOCK]);
      if (isNaN(sa)) sa=999999;
      if (isNaN(sb)) sb=999999;
      return sa-sb;
    });
  }

  return rows;
}

function resetGrid() {
  gridOffset=0;
  document.getElementById('browseGrid').innerHTML='';
  appendGridCards();
}

function renderBrowseGrid() {
  if (!allRows.length) {
    document.getElementById('browseStatus').style.display='flex';
    var chk=setInterval(function(){
      if (allRows.length) { clearInterval(chk); renderBrowseGrid(); }
    }, 400);
    return;
  }
  document.getElementById('browseStatus').style.display='none';
  buildSeriesPills();
  resetGrid();
}

function loadMoreGrid() { appendGridCards(); }

function appendGridCards() {
  var grid=document.getElementById('browseGrid');
  var filtered=getFilteredRows();
  var batch=filtered.slice(gridOffset, gridOffset+GRID_PAGE_SIZE);
  var ctr=gridOffset;
  batch.forEach(function(row){
    var gid='g'+ctr++;
    var dn=esc((row[COL_DESIGN]||'').trim());
    var retailRaw=(row[COL_RETAIL]||'').trim();
    var photoUrl=makePhotoUrl(row[COL_PHOTO]||'');
    var stockRaw=(row[COL_STOCK]||'').toString().trim();
    var stockNum=parseFloat(stockRaw);
    var priceStr=retailRaw?'\u20B9'+esc(retailRaw):'';
    var stockStr=(stockRaw!==''&&stockRaw!=='-')?stockRaw+' PCS':'';
    var stockLow=(!isNaN(stockNum)&&stockNum<=0)?' low':'';
    var imgHTML=photoUrl
      ?'<div class="grid-spinner" id="gs-'+gid+'"><div class="grid-spinner-ring"></div></div><img id="gi-'+gid+'" data-src="'+esc(photoUrl)+'" alt="'+dn+'">'
      :'<div class="grid-no-photo">&#x1F5BE;</div>';
    var card=document.createElement('div');
    card.className='grid-card';
    card.innerHTML=
      '<div class="grid-img-wrap" id="gw-'+gid+'">'+imgHTML+'</div>'+
      '<div class="grid-info">'+
        '<div class="grid-dn">'+dn+'</div>'+
        (priceStr?'<div class="grid-price">'+priceStr+'</div>':'')+
        (stockStr?'<div class="grid-stock'+stockLow+'">'+stockStr+' in stock</div>':'')+
      '</div>';
    card.addEventListener('click', function(){
      switchTab('search');
      document.getElementById('searchInput').value=(row[COL_DESIGN]||'').trim();
      doSearch();
      window.scrollTo({top:0,behavior:'smooth'});
    });
    grid.appendChild(card);
    if (photoUrl) {
      var img=document.getElementById('gi-'+gid);
      var spinner=document.getElementById('gs-'+gid);
      var loaded=false;
      img.onload=function(){if(loaded)return;loaded=true;img.classList.add('loaded');if(spinner)spinner.style.display='none';};
      img.onerror=function(){if(loaded)return;loaded=true;var w=document.getElementById('gw-'+gid);if(w)w.innerHTML='<div class="grid-no-photo">&#x1F5BE;</div>';};
      img.src=img.getAttribute('data-src');
    }
  });
  gridOffset+=batch.length;
  document.getElementById('loadMoreBtn').style.display=gridOffset<filtered.length?'block':'none';
}

// ─────────────────────────────────────────────────────────────────
// COPY DETAILS
// ─────────────────────────────────────────────────────────────────
function copyDetails(id, designNum, retailRaw, desc) {
  var lines = ['Jariwala Trading Company', 'Design No: ' + designNum];
  if (desc)      lines.push(desc);
  if (retailRaw) lines.push('\u20B9' + retailRaw);
  var text = lines.join('\n');

  var btn = document.getElementById('cb-' + id);
  function markCopied() {
    if (btn) { btn.textContent = '\u2713 Copied!'; btn.classList.add('copied'); }
    setTimeout(function(){
      if (btn) { btn.innerHTML = '&#x1F4CB; Copy Details'; btn.classList.remove('copied'); }
    }, 2000);
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(markCopied).catch(function(){
      fallbackCopy(text); markCopied();
    });
  } else {
    fallbackCopy(text); markCopied();
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

// ─────────────────────────────────────────────────────────────────
// SHARE DESIGN — generates a branded image card via Canvas,
// shares via Web Share API (with image file), falls back to WhatsApp
// ─────────────────────────────────────────────────────────────────

// ─────────────────────────────────────────────────────────────────
// SHARE CANVAS
// Layout: photo fills top section at full height (no cropping),
// then a solid branded panel below with DN + price.
// mode = 'retail' | 'wholesale'
// ─────────────────────────────────────────────────────────────────

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

// ─────────────────────────────────────────────────────────────────
// SHARE CANVAS
// Layout: full photo (contain-width, full natural height, no crop)
//         + solid branded panel BELOW photo with DN + price
// mode = 'retail' | 'wholesale'
// ─────────────────────────────────────────────────────────────────
function buildShareCanvas(designNum, priceRaw, photoUrl, mode) {
  var W       = 800;
  var PANEL_H = 240;  // height of info panel below photo

  return new Promise(function(resolve) {

    function renderFinal(photoImg) {
      // ── Determine canvas height ──
      var imgDrawH;
      if (photoImg) {
        // Scale photo so width = W exactly, preserve aspect ratio fully
        var scale = W / photoImg.naturalWidth;
        imgDrawH  = Math.round(photoImg.naturalHeight * scale);
      } else {
        imgDrawH = 700; // fallback height when no photo
      }

      var TOTAL_H = imgDrawH + PANEL_H;
      var canvas  = document.createElement('canvas');
      canvas.width  = W;
      canvas.height = TOTAL_H;
      var ctx = canvas.getContext('2d');

      // ── Top gradient accent band ──
      var band = ctx.createLinearGradient(0, 0, W, 0);
      band.addColorStop(0,   '#c9184a');
      band.addColorStop(0.5, '#c9a84c');
      band.addColorStop(1,   '#c9184a');
      ctx.fillStyle = band;
      ctx.fillRect(0, 0, W, 7);

      // ── Photo (or dark placeholder) ──
      if (photoImg) {
        ctx.drawImage(photoImg, 0, 0, W, imgDrawH);
      } else {
        ctx.fillStyle = '#1a0a0e';
        ctx.fillRect(0, 0, W, imgDrawH);
        var glow = ctx.createRadialGradient(W/2, imgDrawH/2, 40, W/2, imgDrawH/2, W*0.6);
        glow.addColorStop(0, 'rgba(201,24,74,0.28)');
        glow.addColorStop(1, 'rgba(201,24,74,0)');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, W, imgDrawH);
        // Faint design number watermark in placeholder
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        ctx.font = 'bold 160px Playfair Display, serif';
        ctx.textAlign = 'center';
        ctx.letterSpacing = '2px';
        ctx.fillText(designNum, W/2, imgDrawH/2 + 55);
      }

      // ── Panel background (solid dark ink) ──
      var panelY = imgDrawH;
      ctx.fillStyle = '#1a0a0e';
      ctx.fillRect(0, panelY, W, PANEL_H);

      // Rose glow inside panel
      var pg = ctx.createRadialGradient(W/2, panelY + PANEL_H/2, 10, W/2, panelY + PANEL_H/2, W*0.55);
      pg.addColorStop(0, 'rgba(201,24,74,0.22)');
      pg.addColorStop(1, 'rgba(201,24,74,0)');
      ctx.fillStyle = pg;
      ctx.fillRect(0, panelY, W, PANEL_H);

      // ── Gold separator line at photo/panel boundary ──
      var sep = ctx.createLinearGradient(0, 0, W, 0);
      sep.addColorStop(0,   'transparent');
      sep.addColorStop(0.5, 'rgba(201,168,76,0.8)');
      sep.addColorStop(1,   'transparent');
      ctx.strokeStyle = sep;
      ctx.lineWidth   = 2;
      ctx.beginPath(); ctx.moveTo(0, panelY); ctx.lineTo(W, panelY); ctx.stroke();

      ctx.textAlign = 'center';

      // ── Brand micro-label ──
      ctx.fillStyle     = 'rgba(255,179,193,0.6)';
      ctx.font          = '500 15px DM Sans, sans-serif';
      ctx.letterSpacing = '5px';
      ctx.fillText('JARIWALA TRADING COMPANY', W/2, panelY + 38);

      // ── Design number (large) ──
      ctx.fillStyle     = '#ffffff';
      ctx.font          = 'bold 62px Playfair Display, serif';
      ctx.letterSpacing = '1px';
      ctx.fillText('Design No. ' + designNum, W/2, panelY + 120);

      // ── Price ──
      if (priceRaw) {
        var modeLabel = (mode === 'wholesale') ? 'WHOLESALE RATE' : 'RETAIL RATE';
        ctx.fillStyle     = 'rgba(201,168,76,0.65)';
        ctx.font          = '500 13px DM Sans, sans-serif';
        ctx.letterSpacing = '3px';
        ctx.fillText(modeLabel, W/2, panelY + 156);

        ctx.fillStyle     = '#c9a84c';
        ctx.font          = '700 44px DM Sans, sans-serif';
        ctx.letterSpacing = '1px';
        ctx.fillText('\u20B9' + priceRaw, W/2, panelY + 210);
      } else {
        ctx.fillStyle     = 'rgba(255,255,255,0.3)';
        ctx.font          = '300 24px DM Sans, sans-serif';
        ctx.letterSpacing = '1px';
        ctx.fillText('Rate on request', W/2, panelY + 175);
      }

      // ── Bottom gold band ──
      ctx.fillStyle = band;
      ctx.fillRect(0, TOTAL_H - 6, W, 6);

      resolve(canvas);
    }

    if (photoUrl) {
      var img   = new Image();
      img.crossOrigin = 'anonymous';
      var done  = false;
      var timer = setTimeout(function() {
        if (done) return; done = true;
        img.src = ''; renderFinal(null);
      }, 7000);
      img.onload = function() {
        if (done) return; done = true;
        clearTimeout(timer); renderFinal(img);
      };
      img.onerror = function() {
        if (done) return; done = true;
        clearTimeout(timer); renderFinal(null);
      };
      img.src = photoUrl;
    } else {
      renderFinal(null);
    }
  });
}

// ─────────────────────────────────────────────────────────────────
// SHARE DESIGN — image only, no text body
// ─────────────────────────────────────────────────────────────────
function shareDesign(designNum, priceRaw, desc, photoUrl, mode) {
  buildShareCanvas(designNum, priceRaw, photoUrl, mode).then(function(canvas) {
    canvas.toBlob(function(blob) {
      if (!blob) { doFallbackShare(photoUrl); return; }

      var modeLabel = (mode === 'wholesale') ? 'Wholesale' : 'Retail';
      var file = new File([blob], 'Design-' + designNum + '-' + modeLabel + '.png', { type: 'image/png' });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        // Share image only — no title text, no body text
        navigator.share({ files: [file] })
          .catch(function(e) {
            if (e.name !== 'AbortError') doFallbackShare(photoUrl);
          });
      } else {
        doFallbackShare(photoUrl);
      }
    }, 'image/png');
  });
}

// Fallback: if file sharing not supported, just open WhatsApp
// with the photo URL — no text, clean share
function doFallbackShare(photoUrl) {
  if (photoUrl) {
    window.open('https://wa.me/?text=' + encodeURIComponent(photoUrl), '_blank');
  } else if (navigator.share) {
    navigator.share({ url: window.location.href }).catch(function(){});
  }
}
